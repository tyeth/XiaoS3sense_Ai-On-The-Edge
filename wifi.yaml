# Uses the standard ESPHome secret names (wifi_ssid / wifi_password) that the
# ESPHome Builder creates by default, so it compiles with no extra secrets.
# Vendored/adapted from nliaudat/esphome_ai_component (MIT). See ATTRIBUTION.md.
wifi:
  id: ${id_prefix}_wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Optional second network — uncomment and add the secrets if you want it.
  # networks:
  #   - ssid: !secret wifi_ssid
  #     password: !secret wifi_password
  #   - ssid: !secret wifi_ssid_2
  #     password: !secret wifi_password_2

  # Fallback captive-portal hotspot if Wi-Fi fails. Change this password.
  ap:
    ssid: "${name} Fallback"
    password: "meterocr-fallback"

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    entity_category: "diagnostic"
    id: ${id_prefix}_wifi_signal_db
