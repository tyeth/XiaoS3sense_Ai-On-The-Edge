# Camera setup — https://esphome.io/components/esp32_camera.html
# Vendored from nliaudat/esphome_ai_component (MIT). See ATTRIBUTION.md.
#
# OV5640 note: the driver auto-detects the sensor. The first five image
# parameters (resolution, jpeg_quality, pixel_format, framebuffer location,
# framerate) fix the framebuffer at esp_camera_init() and cannot change at
# runtime — change them here and reflash. Everything below the framebuffer
# block CAN be changed live via update_camera_parameters().

i2c:
  sda: ${i2c_pins_sda}
  scl: ${i2c_pins_scl}
  id: ${id_prefix}_bus_camera

esp32_camera:
  id: ${id_prefix}_espcam
  name: ${friendly_name}_camera
  external_clock:
    pin: ${external_clock_pin}
    frequency: ${external_clock_frequency}
  i2c_id: ${id_prefix}_bus_camera
  data_pins: ${data_pins}
  vsync_pin: ${vsync_pin}
  href_pin: ${href_pin}
  pixel_clock_pin: ${pixel_clock_pin}

  # ---- Framebuffer (fixed at boot) ----
  resolution: ${camera_resolution}
  jpeg_quality: ${camera_jpeg_quality}
  max_framerate: ${camera_max_framerate}
  idle_framerate: ${camera_idle_framerate}
  frame_buffer_location: PSRAM
  # JPEG + software grayscale in the ImageProcessor is the reliable path; the
  # camera driver can't do grayscale + windowing together.
  pixel_format: JPEG

  # ---- Runtime-adjustable (also exposed in HA via camera_options.yaml) ----
  vertical_flip: false
  horizontal_mirror: false
  contrast: 0
  brightness: 0
  saturation: 0
  special_effect: NONE
  aec_mode: AUTO
  aec2: True
  ae_level: 0
  aec_value: 580
  agc_mode: AUTO
  agc_gain_ceiling: 2X
  agc_value: 0
  wb_mode: AUTO
  test_pattern: False
