# ---------------------------------------------------------------------------
# ESPHome Builder wrapper (Home Assistant)
#
# Paste this as a NEW device in the ESPHome Builder add-on. It pulls the full
# project from GitHub as a package and compiles it inside Home Assistant — no
# local toolchain, and no secrets.yaml in the repo. Secrets live in the
# Builder's own secrets editor (see the list at the bottom).
#
# To pin a version, change @main to a tag/commit.
# ---------------------------------------------------------------------------
substitutions:
  name: xiao-meter-ocr
  friendly_name: "XIAO Meter OCR"
  id_prefix: xiao_meter

  # Meter identity — electricity by default. For gas use: kWh→m³, energy→gas.
  meter_unit: kWh
  meter_device_class: energy
  meter_state_class: total_increasing

  # MQTT broker + credentials — only used if you switch to MQTT (see below).
  # Mosquitto refuses anonymous logins, so set real user/pass in that case.
  mqtt_broker: homeassistant.gdenu.fi
  mqtt_username: ""
  mqtt_password: ""

packages:
  meter_ocr:
    url: https://github.com/tyeth/XiaoS3sense_Ai-On-The-Edge
    ref: main
    files: [config.yaml]
    refresh: 0s   # always re-fetch main; set to e.g. 1d once you've pinned a version

# ---------------------------------------------------------------------------
# Transport: the native ESPHome API by default — Home Assistant auto-discovers
# the device; add it via the ESPHome integration. Only wifi_ssid / wifi_password
# secrets are needed (the ESPHome Builder already has them).
#
# To use MQTT instead: uncomment the mqtt include in config.yaml, set the mqtt_*
# values above, and add the device via HA's MQTT integration (not both).
# ---------------------------------------------------------------------------
